apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-app
  namespace: default
  labels:
    app: streamlit-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-app
  template:
    metadata:
      labels:
        app: streamlit-app
    spec:
      containers:
        - name: streamlit-app
          image: your-dockerhub-username/voyage-streamlit:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          env:
            - name: FLASK_API_URL
              value: "http://ml-api-service:5000"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-service
  namespace: default
spec:
  selector:
    app: streamlit-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: LoadBalancer